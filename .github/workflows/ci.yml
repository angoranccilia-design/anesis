name: CI

on:
  push:
  pull_request:

jobs:
  # Tests rapides (PGlite) — modèle de domaine + persistance en Postgres WASM.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test

  # Réserve 1 — rejeu de l'isolation sur un VRAI Postgres à travers PgBouncer en mode TRANSACTION.
  # Migrations en connexion directe propriétaire (5432) ; requêtes applicatives à travers le pooler
  # transaction (6432), authentifiées DIRECTEMENT comme anesis_app — jamais `set role` (qui ne survit
  # pas au pooling transaction). C'est le modèle de connexion réel de production.
  db-real-postgres:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: anesis_owner
          POSTGRES_PASSWORD: owner
          POSTGRES_DB: anesis
          # trust = auth réseau simple (le pooler se connecte comme anesis_app sans négociation scram).
          # N'affecte QUE l'authentification, jamais la RLS/les rôles — le cœur de ce qu'on teste.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U anesis_owner" --health-interval 5s --health-timeout 5s --health-retries 10
      pgbouncer:
        image: edoburu/pgbouncer:latest
        env:
          DB_HOST: postgres
          # auth_user = anesis_owner (SUPERUSER) : indispensable pour l'auth_query de PgBouncer, qui lit
          # pg_shadow (réservé au superuser) pour valider le mot de passe du client. Le CLIENT, lui, se
          # connecte comme anesis_app (voir ANESIS_TEST_APP_DATABASE_URL) → PgBouncer ouvre alors le
          # backend comme anesis_app (RLS active). anesis_app reçoit login+password dans le beforeAll.
          DB_USER: anesis_owner
          DB_PASSWORD: owner
          DB_NAME: anesis
          POOL_MODE: transaction        # ← mode exigé par set_config(..., true)
          # trust : pas de vérif de mot de passe côté pooler (Postgres 16 stocke un secret SCRAM que
          # `plain` ne sait pas valider → ECONNRESET). Le pooler ouvre le backend comme le rôle du
          # client (anesis_app), lui-même en trust côté Postgres. Auth réseau seulement — RLS intacte.
          AUTH_TYPE: trust
          MAX_CLIENT_CONN: "100"
        ports: ["6432:6432"]
    env:
      # Migrations en direct (propriétaire) ; tests applicatifs à TRAVERS le pooler transaction, comme anesis_app.
      ANESIS_TEST_DATABASE_URL: postgres://anesis_owner:owner@localhost:5432/anesis
      ANESIS_TEST_APP_DATABASE_URL: postgres://anesis_app:app@localhost:6432/anesis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      # real-postgres.test.ts s'active parce que ANESIS_TEST_DATABASE_URL est défini.
      - run: pnpm --filter @anesis/db test
